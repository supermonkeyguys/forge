<h2>设置页布局设计</h2>
<p class="subtitle">与 ProjectsPage 风格一致的全屏页面</p>

<div class="mockup">
  <div class="mockup-header">SettingsPage — /settings</div>
  <div class="mockup-body">
    <div style="background:#0e1016;min-height:500px;font-family:system-ui;color:#e8eaf0;padding:0">

      <!-- Top Nav Bar (same as ProjectsPage) -->
      <div style="background:#0b0d13;border-bottom:1px solid #1e2230;padding:12px 32px;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="color:#f97316;font-weight:700;font-size:15px">⬡ FORGE</span>
          <span style="color:#555;font-size:13px">/</span>
          <span style="color:#888;font-size:13px">设置</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="background:#1e2230;border-radius:6px;padding:4px 12px;font-size:12px;color:#888">← 返回项目</span>
        </div>
      </div>

      <div style="max-width:720px;margin:0 auto;padding:40px 32px">

        <!-- Page Title -->
        <div style="margin-bottom:32px">
          <h1 style="font-size:22px;font-weight:700;margin:0 0 4px">设置</h1>
          <p style="font-size:13px;color:#666;margin:0">管理 API 配置与界面偏好</p>
        </div>

        <!-- Section: AI 服务配置 -->
        <div style="margin-bottom:32px">
          <div style="font-size:11px;font-weight:600;color:#f97316;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px">AI 服务配置</div>
          <div style="background:#111520;border:1px solid #1e2230;border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:16px">

            <div>
              <div style="font-size:12px;color:#888;margin-bottom:6px">Base URL</div>
              <div style="background:#0b0d13;border:1px solid #1e2230;border-radius:6px;padding:8px 12px;font-size:13px;color:#555;font-family:monospace">https://api.openai.com/v1</div>
            </div>

            <div>
              <div style="font-size:12px;color:#888;margin-bottom:6px">API Key</div>
              <div style="background:#0b0d13;border:1px solid #1e2230;border-radius:6px;padding:8px 12px;font-size:13px;color:#555;display:flex;justify-content:space-between;align-items:center">
                <span>••••••••••••••••••••••••</span>
                <span style="color:#f97316;font-size:11px;cursor:pointer">已配置 · 更新</span>
              </div>
            </div>

            <div style="display:flex;justify-content:flex-end">
              <div style="background:#f97316;color:#0b0d13;border-radius:6px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer">保存配置</div>
            </div>
          </div>
        </div>

        <!-- Section: 外观 -->
        <div style="margin-bottom:32px">
          <div style="font-size:11px;font-weight:600;color:#f97316;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px">外观</div>
          <div style="background:#111520;border:1px solid #1e2230;border-radius:10px;padding:20px">
            <div style="font-size:12px;color:#888;margin-bottom:12px">主题色</div>
            <div style="display:flex;gap:12px;align-items:center">
              <div style="width:32px;height:32px;border-radius:50%;background:#f97316;border:2px solid white;cursor:pointer;position:relative">
                <div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;white-space:nowrap">橙色</div>
              </div>
              <div style="width:32px;height:32px;border-radius:50%;background:#3b82f6;cursor:pointer;position:relative">
                <div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;white-space:nowrap">蓝色</div>
              </div>
              <div style="width:32px;height:32px;border-radius:50%;background:#10b981;cursor:pointer;position:relative">
                <div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;white-space:nowrap">绿色</div>
              </div>
              <div style="width:32px;height:32px;border-radius:50%;background:#8b5cf6;cursor:pointer;position:relative">
                <div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;white-space:nowrap">紫色</div>
              </div>
            </div>
            <p style="font-size:11px;color:#555;margin-top:24px">选择后立即生效，刷新保留</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
