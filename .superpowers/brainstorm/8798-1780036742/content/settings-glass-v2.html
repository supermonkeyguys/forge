<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f14;
    background-image:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(249,115,22,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(99,102,241,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(16,185,129,0.07) 0%, transparent 60%);
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    height: 40px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    flex-shrink: 0;
  }
  .traffic-lights { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28c840; }
  .tab {
    margin-left: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 200px;
    background: rgba(255,255,255,0.025);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 12px 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-section-label {
    font-size: 10.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 12px 14px 5px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    border-radius: 6px;
    margin: 1px 6px;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.75); }
  .sidebar-item.active { background: rgba(249,115,22,0.12); color: rgba(255,255,255,0.9); }
  .sidebar-item svg { opacity: 0.55; flex-shrink: 0; }
  .sidebar-item.active svg { opacity: 1; }

  .settings-nav {
    width: 210px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 20px 0;
    flex-shrink: 0;
  }
  .settings-nav-title {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    padding: 0 14px 18px;
  }
  .settings-nav-group-label {
    font-size: 10.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 10px 14px 5px;
  }
  .settings-nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    border-radius: 6px;
    margin: 1px 6px;
  }
  .settings-nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.75); }
  .settings-nav-item.active { background: rgba(249,115,22,0.13); color: rgba(255,255,255,0.92); }
  .settings-nav-item svg { opacity: 0.55; flex-shrink: 0; }
  .settings-nav-item.active svg { opacity: 1; }

  .content { flex: 1; padding: 32px 40px; overflow-y: auto; }
  .content-title { font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.88); margin-bottom: 20px; }

  .section-card {
    background: rgba(255,255,255,0.045);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .field-label { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.4); margin-bottom: 7px; }
  .field-row { margin-bottom: 18px; }
  .field-row:last-child { margin-bottom: 0; }

  .mock-input {
    width: 100%;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px;
    padding: 9px 13px;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    font-family: 'SF Mono', 'JetBrains Mono', monospace;
  }
  .mock-input.masked { color: rgba(255,255,255,0.2); letter-spacing: 3px; }
  .input-row { display: flex; gap: 8px; align-items: center; }

  .badge-configured {
    flex-shrink: 0;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: 5px;
    padding: 4px 9px;
    font-size: 11px;
    color: #5ecb9e;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .field-hint { font-size: 11.5px; color: rgba(255,255,255,0.25); margin-top: 7px; line-height: 1.5; }

  .btn-primary {
    background: linear-gradient(135deg, #f97316, #ea6d0e);
    color: #0d0f14;
    border: none;
    border-radius: 7px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(249,115,22,0.35);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    padding: 8px 18px;
    font-size: 13px;
    cursor: pointer;
  }
  .action-row {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .swatches { display: flex; gap: 20px; align-items: center; margin-top: 10px; }
  .swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .swatch { width: 34px; height: 34px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .swatch.active { box-shadow: 0 0 0 2px #0d0f14, 0 0 0 4px rgba(255,255,255,0.6), 0 2px 12px rgba(0,0,0,0.4); }
  .swatch-label { font-size: 11px; color: rgba(255,255,255,0.3); }
  .section-subtitle { font-size: 11.5px; color: rgba(255,255,255,0.28); margin-top: 14px; line-height: 1.5; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic-lights">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
  </div>
  <div class="tab">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    Settings
  </div>
</div>

<div class="layout">

  <!-- Col 1: App sidebar -->
  <div class="sidebar">
    <div class="sidebar-section-label">工作区</div>
    <div class="sidebar-item">
      <!-- LayoutGrid -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      项目
    </div>
    <div class="sidebar-item">
      <!-- MessageSquare -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      对话
    </div>
    <div class="sidebar-section-label">配置</div>
    <div class="sidebar-item active">
      <!-- Settings -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      设置
    </div>
  </div>

  <!-- Col 2: Settings nav -->
  <div class="settings-nav">
    <div class="settings-nav-title">设置</div>

    <div class="settings-nav-group-label">账号</div>
    <div class="settings-nav-item">
      <!-- User -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      个人资料
    </div>

    <div class="settings-nav-group-label">AI 服务</div>
    <div class="settings-nav-item active">
      <!-- KeyRound -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6M15.5 7.5l3 3"/></svg>
      API 配置
    </div>

    <div class="settings-nav-group-label">偏好</div>
    <div class="settings-nav-item">
      <!-- Palette -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      外观
    </div>
    <div class="settings-nav-item">
      <!-- Bell -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      通知
    </div>
  </div>

  <!-- Col 3: Content -->
  <div class="content">
    <div class="content-title">API 配置</div>

    <div class="section-card">
      <div class="field-row">
        <div class="field-label">Base URL</div>
        <div class="mock-input">https://api.openai.com/v1</div>
      </div>
      <div class="field-row">
        <div class="field-label">API Key</div>
        <div class="input-row">
          <div class="mock-input masked" style="flex:1">••••••••••••••••••••••••••••••••</div>
          <div class="badge-configured">
            <!-- Check -->
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            已配置
          </div>
        </div>
        <div class="field-hint">Key 加密存储于服务器，前端不可读取。如需更换请直接填入新值覆盖。</div>
      </div>
      <div class="action-row">
        <button class="btn-secondary">重置</button>
        <button class="btn-primary">保存</button>
      </div>
    </div>

    <div class="content-title" style="margin-top:28px">外观</div>

    <div class="section-card">
      <div class="field-label">主题色</div>
      <div class="swatches">
        <div class="swatch-wrap">
          <div class="swatch active" style="background:linear-gradient(135deg,#f97316,#ea6d0e)"></div>
          <span class="swatch-label">橙色</span>
        </div>
        <div class="swatch-wrap">
          <div class="swatch" style="background:linear-gradient(135deg,#3b82f6,#2563eb)"></div>
          <span class="swatch-label">蓝色</span>
        </div>
        <div class="swatch-wrap">
          <div class="swatch" style="background:linear-gradient(135deg,#10b981,#059669)"></div>
          <span class="swatch-label">绿色</span>
        </div>
        <div class="swatch-wrap">
          <div class="swatch" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)"></div>
          <span class="swatch-label">紫色</span>
        </div>
      </div>
      <div class="section-subtitle">选择后立即生效，通过修改 CSS 变量 <code style="color:rgba(255,255,255,0.4)">--primary</code> 应用到全站，刷新保留。</div>
    </div>

  </div>

</div>
</body>
</html>
