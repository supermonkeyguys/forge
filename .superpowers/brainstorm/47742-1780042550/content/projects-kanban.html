<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f14;
    background-image:
      radial-gradient(ellipse 50% 60% at 10% 40%, rgba(249,115,22,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 90% 60%, rgba(99,102,241,0.06) 0%, transparent 70%);
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    height: 40px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; padding: 0 16px; gap: 8px; flex-shrink: 0;
  }
  .traffic-lights { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28c840; }
  .brand { margin-left: 12px; font-size: 13px; font-weight: 700; color: #f97316; letter-spacing: 0.05em; }
  .app { display: flex; flex: 1; overflow: hidden; }

  /* ── Global sidebar ── */
  .global-sidebar {
    width: 52px; flex-shrink: 0;
    background: rgba(255,255,255,0.02);
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0; gap: 2px;
  }
  .nav-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(255,255,255,0.3);
    transition: all 0.15s; position: relative;
  }
  .nav-icon:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.65); }
  .nav-icon.active { background: rgba(249,115,22,0.13); color: #f97316; }
  .nav-icon.active::before {
    content: ''; position: absolute; left: -1px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 16px; background: #f97316; border-radius: 0 2px 2px 0;
  }
  .nav-icon svg { width: 17px; height: 17px; stroke-width: 1.5; }
  .nav-spacer { flex: 1; }
  .nav-divider { width: 28px; height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }
  .nav-icon::after {
    content: attr(data-tip); position: absolute; left: calc(100% + 8px); top: 50%;
    transform: translateY(-50%); background: rgba(20,22,30,0.96);
    border: 1px solid rgba(255,255,255,0.1); color: #ddd;
    font-size: 11px; padding: 3px 8px; border-radius: 5px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity 0.12s; z-index: 200;
  }
  .nav-icon:hover::after { opacity: 1; }

  /* ── Main content ── */
  .main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  .page-header {
    padding: 22px 28px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }
  .page-title { font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.88); }
  .page-subtitle { font-size: 11.5px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .btn-new {
    background: linear-gradient(135deg, #f97316, #ea6d0e);
    color: #0d0f14; border: none; border-radius: 7px;
    padding: 6px 15px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; box-shadow: 0 2px 10px rgba(249,115,22,0.28);
    white-space: nowrap;
  }

  /* ── Kanban board ── */
  .kanban-board {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    gap: 16px;
    padding: 20px 28px;
    align-items: flex-start;
  }

  /* ── Column ── */
  .kanban-col {
    flex-shrink: 0;
    width: 240px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Column header */
  .col-header {
    display: flex; align-items: center; gap: 7px;
    padding: 0 2px; margin-bottom: 2px;
  }
  .col-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .col-dot.draft  { background: rgba(255,255,255,0.3); }
  .col-dot.active { background: #f97316; box-shadow: 0 0 6px rgba(249,115,22,0.55); animation: blink 2s ease-in-out infinite; }
  .col-dot.done   { background: #10b981; }
  .col-dot.failed { background: #ef4444; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.45} }

  .col-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }
  .col-count {
    font-size: 11px; color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    border-radius: 9px; padding: 0px 6px;
    margin-left: auto;
  }

  /* ── Dashed container (the "lane") ── */
  .col-lane {
    border: 1.5px dashed rgba(255,255,255,0.10);
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 160px;
    background: rgba(255,255,255,0.01);
    position: relative;
  }
  /* subtle inner glow per column type */
  .col-lane.draft  { border-color: rgba(255,255,255,0.09); }
  .col-lane.active { border-color: rgba(249,115,22,0.22); background: rgba(249,115,22,0.02); }
  .col-lane.done   { border-color: rgba(16,185,129,0.2);  background: rgba(16,185,129,0.01); }
  .col-lane.failed { border-color: rgba(239,68,68,0.18);  background: rgba(239,68,68,0.01); }

  /* Empty lane placeholder */
  .lane-empty {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; color: rgba(255,255,255,0.18);
    font-style: italic;
    padding: 24px 0;
  }

  /* ── Project card ── */
  .project-card {
    background: rgba(255,255,255,0.045);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px;
    padding: 12px 13px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.2);
  }
  .project-card:hover {
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.065);
  }
  .card-name {
    font-size: 12.5px; font-weight: 500;
    color: rgba(255,255,255,0.8);
    line-height: 1.4;
    margin-bottom: 8px;
  }

  /* Progress bar (active only) */
  .card-progress {
    height: 2px; background: rgba(255,255,255,0.07);
    border-radius: 1px; margin-bottom: 8px; overflow: hidden;
  }
  .card-progress-fill {
    height: 100%; border-radius: 1px;
    background: linear-gradient(90deg, #f97316, #fb923c);
  }

  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-date { font-size: 10.5px; color: rgba(255,255,255,0.22); }
  .card-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500;
  }
  .badge-draft  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.38); }
  .badge-active { background: rgba(249,115,22,0.14); color: #fb923c; }
  .badge-done   { background: rgba(16,185,129,0.13); color: #34d399; }
  .badge-failed { background: rgba(239,68,68,0.13);  color: #f87171; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic-lights">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
  </div>
  <span class="brand">⬡ FORGE</span>
</div>

<div class="app">

  <!-- Global sidebar -->
  <nav class="global-sidebar">
    <div class="nav-icon active" data-tip="项目">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="nav-icon" data-tip="对话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-divider"></div>
    <div class="nav-icon" data-tip="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
    </div>
  </nav>

  <!-- Projects page -->
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">我的项目</div>
        <div class="page-subtitle">6 个项目</div>
      </div>
      <button class="btn-new">+ 新建项目</button>
    </div>

    <!-- Kanban board -->
    <div class="kanban-board">

      <!-- 草稿 -->
      <div class="kanban-col">
        <div class="col-header">
          <div class="col-dot draft"></div>
          <span class="col-title">草稿</span>
          <span class="col-count">3</span>
        </div>
        <div class="col-lane draft">
          <div class="project-card">
            <div class="card-name">测试项目</div>
            <div class="card-footer">
              <span class="card-date">5月29日</span>
              <span class="card-badge badge-draft">待机</span>
            </div>
          </div>
          <div class="project-card">
            <div class="card-name">我想要一个预约系统</div>
            <div class="card-footer">
              <span class="card-date">5月28日</span>
              <span class="card-badge badge-draft">待机</span>
            </div>
          </div>
          <div class="project-card">
            <div class="card-name">企业内部知识库平台</div>
            <div class="card-footer">
              <span class="card-date">5月27日</span>
              <span class="card-badge badge-draft">待机</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 进行中 -->
      <div class="kanban-col">
        <div class="col-header">
          <div class="col-dot active"></div>
          <span class="col-title">进行中</span>
          <span class="col-count">2</span>
        </div>
        <div class="col-lane active">
          <div class="project-card">
            <div class="card-name">帮我做一个简单的电商后台</div>
            <div class="card-progress"><div class="card-progress-fill" style="width:65%"></div></div>
            <div class="card-footer">
              <span class="card-date">5月29日</span>
              <span class="card-badge badge-active">构建中</span>
            </div>
          </div>
          <div class="project-card">
            <div class="card-name">我需要一个报销申请系统</div>
            <div class="card-progress"><div class="card-progress-fill" style="width:30%"></div></div>
            <div class="card-footer">
              <span class="card-date">5月29日</span>
              <span class="card-badge badge-active">规划中</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 已完成 -->
      <div class="kanban-col">
        <div class="col-header">
          <div class="col-dot done"></div>
          <span class="col-title">已完成</span>
          <span class="col-count">1</span>
        </div>
        <div class="col-lane done">
          <div class="project-card">
            <div class="card-name">客户反馈收集系统</div>
            <div class="card-footer">
              <span class="card-date">5月20日</span>
              <span class="card-badge badge-done">已完成</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 失败 -->
      <div class="kanban-col">
        <div class="col-header">
          <div class="col-dot failed"></div>
          <span class="col-title">失败</span>
          <span class="col-count">0</span>
        </div>
        <div class="col-lane failed">
          <div class="lane-empty">暂无失败项目</div>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
